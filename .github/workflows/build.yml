name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🚀 CAMBIO CLAVE: Subimos a Go 1.25 para que compile SQLite y Unleash
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true 

      # Configuración limpia de la toolchain para evitar timeouts en GitHub
      - name: Configure Go Environment
        run: go env -w GOTOOLCHAIN=auto

      - name: Run gofmt check
        run: gofmt -l $(find . -name '*.go' -not -path './vendor/*')

      - name: Run Go tests
        run: go test ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
