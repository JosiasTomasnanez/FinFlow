name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 1. Job exclusivo para el despliegue
  deploy-stg:
    name: Deploy Backend & Frontend to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Staging (Backend)
        run: curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

      - name: Trigger Vercel Staging (Frontend)
        run: curl -X POST "${{ secrets.VERCEL_STAGING_DEPLOY_HOOK }}"

      - name: Wait for staging deployment
        run: sleep 90

  # 2. Job separado para la prueba de seguridad (corre en paralelo o después)
  security-scan:
    name: Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy-stg # <--- Esto asegura que primero se despliegue y luego se escanee
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # ZAP a veces necesita el contexto del repo para guardar reportes

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "https://finflow-sand.vercel.app/"
