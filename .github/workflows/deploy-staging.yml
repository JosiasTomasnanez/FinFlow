security-scan:
    name: Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy-stg
    permissions:
      issues: write # Permiso para que cree los Issues en GitHub con los reportes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Escaneo 1: Al Frontend (Vercel)
      - name: Run OWASP ZAP on Frontend
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "https://finflow-sand.vercel.app/"
          issue_title: "Security Scan Alerts - Frontend"

      # Escaneo 2: Al Backend (Render)
      - name: Run OWASP ZAP on Backend API
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "https://tu-api-en-render.onrender.com/api/v1" # <--- Pon aquí la URL base de tu backend
          issue_title: "Security Scan Alerts - Backend API"
