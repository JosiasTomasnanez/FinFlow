name: CI/CD Deploy Staging

on:
  push:
    branches:
      - main

jobs:
  # 1. Tu Job original de despliegue
  deploy-stg:
    name: Deploy Backend & Frontend to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Staging (Backend)
        run: curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

      - name: Trigger Vercel Staging (Frontend)
        run: curl -X POST "${{ secrets.VERCEL_STAGING_DEPLOY_HOOK }}"

      - name: Wait for staging deployment
        run: sleep 90

  # 2. El nuevo Job de seguridad (Ahora alineado correctamente debajo de "jobs:")
  security-scan:
    name: Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy-stg
    permissions:
      issues: write # Permite que cree los reportes en la pestaña Issues
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Escaneo al Frontend (Vercel)
      - name: Run OWASP ZAP on Frontend
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "https://finflow-sand.vercel.app/"
          issue_title: "Security Scan Alerts - Frontend"

      # Escaneo al Backend (Render)
      - name: Run OWASP ZAP on Backend API
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "https://finflow-backend-uv2f.onrender.com" 
          issue_title: "Security Scan Alerts - Backend API"
