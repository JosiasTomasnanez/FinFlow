name: CI/CD - Build, Pack & Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write  

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::199667819856:role/github-actions-finflow-role
  REGISTRY: 199667819856.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Configure Go Environment
        run: go env -w GOTOOLCHAIN=auto

      - name: Run gofmt check
        run: gofmt -l $(find . -name '*.go' -not -path './vendor/')

      - name: Run Go tests
        run: go test ./...

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-and-push-ecr:
    name: Build & Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---- 1. BUILD & PUSH IMAGES ----
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/finflow-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/finflow-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: true
          tags: |
            ${{ env.REGISTRY }}/finflow-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/finflow-frontend:latest

      # ---- 2. HELM CHARTS AUTOMATION ----
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login Helm to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | helm login --username AWS --password-stdin ${{ env.REGISTRY }}

      - name: Package and Push Helm Chart
        run: |
          helm package finflow-infra --destination finflow-chart/charts/

          helm dependency list finflow-chart
          
          helm package finflow-chart --version 1.0.${{ github.run_number }}
          
          helm push finflow-chart-1.0.${{ github.run_number }}.tgz oci://${{ env.REGISTRY }}

      - name: Update Staging Tags with yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging.yaml
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging.yaml

      - name: Commit and Push Changes to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values-staging.yaml
          git commit -m "chore(gitops): update staging image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git push origin main
