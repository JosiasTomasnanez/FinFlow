name: CI/CD - Build, Pack & Push (ECR + Harbor)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::199667819856:role/github-actions-finflow-role
  ECR_REGISTRY: 199667819856.dkr.ecr.us-east-1.amazonaws.com
  HARBOR_REGISTRY: harbor.finflow.local
  HARBOR_PROJECT: finflow
  IMAGE_TAG: ${{ github.sha }}

jobs:
  bypass-checks:
    name: Prepare Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Code validation bypass
        run: echo "Saltando validaciones locales. El build real se ejecutará en los contenedores de Docker."

  build-and-push-ecr:
    name: Build & Push to Amazon ECR (Cloud)
    runs-on: ubuntu-latest
    needs: bypass-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/finflow-backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/finflow-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/finflow-frontend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/finflow-frontend:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login Helm to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Package and Push Helm Chart to ECR
        run: |
          helm package finflow-infra --destination finflow-chart/charts/
          helm dependency list finflow-chart
          helm package finflow-chart --version 1.0.${{ github.run_number }}
          helm push finflow-chart-1.0.${{ github.run_number }}.tgz oci://${{ env.ECR_REGISTRY }}

      - name: Update Staging AWS Tags with yq
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p $HOME/.local/bin
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O $HOME/.local/bin/yq && chmod +x $HOME/.local/bin/yq
          export PATH="$HOME/.local/bin:$PATH"
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging-aws.yaml
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging-aws.yaml

      - name: Commit and Push Staging AWS Changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values-staging-aws.yaml
          git commit -m "chore(gitops): update staging-aws image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git stash -u
          git pull --rebase origin main
          git push origin HEAD:main
          git stash drop || echo "Nada que limpiar en el stash"

      - name: Update Prod AWS Tags with yq
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p $HOME/.local/bin
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O $HOME/.local/bin/yq && chmod +x $HOME/.local/bin/yq
          export PATH="$HOME/.local/bin:$PATH"
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' values-prod-aws.yaml
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' values-prod-aws.yaml

      - name: Commit and Push Prod AWS Changes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values-prod-aws.yaml
          git commit -m "chore(gitops): update prod-aws image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git stash -u
          git pull --rebase origin main
          git push origin HEAD:main
          git stash drop || echo "Nada que limpiar en el stash"

  build-and-push-harbor:
    name: Build & Push to Harbor (Local)
    runs-on: self-hosted
    needs: bypass-checks
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/finflow-backend:${{ env.IMAGE_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/finflow-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/finflow-frontend:${{ env.IMAGE_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/finflow-frontend:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login Helm to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | helm registry login ${{ env.HARBOR_REGISTRY }} --username 'robot$github-actions' --password-stdin

      - name: Package and Push Helm Chart to Harbor
        run: |
          helm package finflow-infra --destination finflow-chart/charts/
          helm dependency list finflow-chart
          helm package finflow-chart --version 1.0.${{ github.run_number }}
          helm push finflow-chart-1.0.${{ github.run_number }}.tgz oci://${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }} --insecure-skip-tls-verify

      - name: Update Staging Local Tags with yq
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p $HOME/.local/bin
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O $HOME/.local/bin/yq && chmod +x $HOME/.local/bin/yq
          export PATH="$HOME/.local/bin:$PATH"
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging.yaml
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' values-staging.yaml

      - name: Commit and Push Staging Local Changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values-staging.yaml
          git commit -m "chore(gitops): update staging (local/harbor) image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git stash -u
          git pull --rebase origin main
          git push origin HEAD:main
          git stash drop || echo "Nada que limpiar en el stash"

      - name: Update Prod Local Tags with yq
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p $HOME/.local/bin
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O $HOME/.local/bin/yq && chmod +x $HOME/.local/bin/yq
          export PATH="$HOME/.local/bin:$PATH"
          yq -i '.backend.image.tag = "${{ env.IMAGE_TAG }}"' values-prod.yaml
          yq -i '.frontend.image.tag = "${{ env.IMAGE_TAG }}"' values-prod.yaml

      - name: Commit and Push Prod Local Changes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values-prod.yaml
          git commit -m "chore(gitops): update prod (local/harbor) image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git stash -u
          git pull --rebase origin main
          git push origin HEAD:main
          git stash drop || echo "Nada que limpiar en el stash"
