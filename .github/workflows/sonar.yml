name: SonarQube

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🚀 ACTUALIZACIÓN: Usamos la versión oficial y moderna de la acción
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # 🛠️ PARÁMETROS CLAVE: Configuramos Sonar de forma profesional
        with:
          args: >
            -Dsonar.projectKey=finflow
            -Dsonar.sources=.
            -Dsonar.exclusions=**/vendor/**,**/*.js,**/dist/**,frontend/node_modules/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go,frontend/**/*.test.js
