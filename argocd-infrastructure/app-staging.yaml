apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finflow-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/josiastomasnanez/FinFlow.git'
    targetRevision: main
    path: finflow-chart
    helm:
      valueFiles:
        - ../values-staging.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: finflow-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      name: finflow-staging-app # <--- OJO ACÁ: asegurate de que el nombre del Rollout en staging sea este (o el que corresponda según tu template)
      jsonPointers:
        - /spec/replicas
