apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://kedacore.github.io/charts'
      chart: keda
      targetRevision: 2.20.1
      helm:
        valueFiles:
          - $root/values-keda.yaml
    - repoURL: 'https://github.com/josiastomasnanez/FinFlow.git'
      targetRevision: main
      ref: root
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: finflow-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
