apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://helm.goharbor.io'
    targetRevision: 1.19.1
    chart: harbor
    helm:
      values: |
        expose:
          type: ingress
          ingress:
            hosts:
              core: harbor.finflow.local
        externalURL: http://harbor.finflow.local
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
