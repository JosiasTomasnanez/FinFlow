apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kedacore.github.io/charts'
    chart: keda
    targetRevision: 2.14.0 
    helm:
      valuesObject:
        prometheus:
          operator:
            enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: finflow-infra 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - SkipDryRunOnMissingResource=true
