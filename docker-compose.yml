services:

  #  PROXY INVERSO
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      finflow-app:
        condition: service_started
      finflow-frontend:
        condition: service_started
      unleash-web:
        condition: service_healthy
      grafana:
        condition: service_healthy 
    networks:
      - finflow-net

  #  BACKEND (Go)
  finflow-app:
    build:
      context: .          
      dockerfile: Dockerfile  
    environment:
      - DB_PATH=${DB_PATH}
      - DATABASE_URL=${DATABASE_URL} 
      - REDIS_URL=${REDIS_URL} # ⚡ Pasado al .env para mayor prolijidad
      - UNLEASH_URL=http://unleash-web:4242/api/
      - UNLEASH_TOKEN=${UNLEASH_SECRET_TOKEN}
      - UNLEASH_APP_NAME=${UNLEASH_APP_NAME}
    volumes:
      - finflow_data:/app/data  
    depends_on:
      unleash-web:
        condition: service_healthy
      finflow-redis: 
        condition: service_healthy
    networks:
      - finflow-net

  # FRONTEND (React + Vite)
  finflow-frontend:
    build:
      context: ./frontend       
      dockerfile: Dockerfile.dev
    environment:
      - PORT=3000 
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - finflow-net

  # BASE DE DATOS (Postgres)
  unleash-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${UNLEASH_DB_NAME}
      POSTGRES_USER: ${UNLEASH_DB_USER}
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASSWORD}
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finflow-net

  # SERVIDOR UNLEASH
  unleash-web:
    image: unleashorg/unleash-server:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${UNLEASH_DB_USER}:${UNLEASH_DB_PASSWORD}@unleash-db:5432/${UNLEASH_DB_NAME}
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: ${UNLEASH_SECRET_TOKEN}
      URL_PREFIX: /unleash
      UNLEASH_URL: http://localhost/unleash/
      BYPASS_WWW_AUTH_FOR_TESTING: "true"
    depends_on:
      unleash-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4242/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))\""]
      interval: 10s       
      timeout: 5s
      retries: 5          
      start_period: 30s   
    networks:
      - finflow-net

  # PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - finflow-net

  #  GRAFANA
  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true 
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck: 
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - finflow-net

  # ⚡ NUEVO SERVICIO: CACHÉ (Redis)
  finflow-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 6339
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6339", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - finflow-net

volumes:
  finflow_data:      
  unleash_db_data:   
  grafana_data: 

networks:
  finflow-net:       
    driver: bridge
