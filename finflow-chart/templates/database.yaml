{{- if and .Values.database .Values.database.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.database.storageClass }}
  storageClassName: {{ .Values.database.storageClass }}
  {{- end }}
  resources:
    rules:
    requests:
      storage: {{ .Values.database.storageSize }} 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres-db
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres-db
    spec: 
      # 2. Solo aplica el nodeSelector si está habilitado en los values
      {{- if .Values.database.nodeSelector }}
      nodeSelector: 
        {{- toYaml .Values.database.nodeSelector | nindent 8 }}
      {{- end }}
      # 3. Solo aplica tolerations si están habilitadas en los values
      {{- if .Values.database.tolerations }}
      tolerations:
        {{- toYaml .Values.database.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres 
          image: postgres:15-alpine 
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app-secret
                  key: DB_NAME
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-service
spec:
  selector:
    app: {{ .Release.Name }}-postgres-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
{{- end }}
