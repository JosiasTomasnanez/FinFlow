{{- if and .Values.ingress .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-app-ingress
  annotations:
    # Mantenemos tus anotaciones dinámicas actuales
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
    # EXPLICACIÓN: Obligamos a que las reglas de este archivo se ordenen correctamente en AWS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | default "finflow.local" }}
      http:
        paths:
          # Primero evaluamos la API (Prioridad alta)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-app-service
                port:
                  number: 8080
          # Al final el frontend como descarte
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend-service
                port:
                  number: 3000
{{- end }}
