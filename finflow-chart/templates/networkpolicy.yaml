{{- if .Values.networkPolicy.enabled }}
# ==============================================================================
# 1. DEFAULT DENY - Bloquea todo el tráfico de entrada y salida por default.
#    A partir de acá, solo pasa lo que se permite explícitamente más abajo.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ==============================================================================
# 2. DNS - Permite resolver nombres de Service (postgres, redis, unleash, etc).
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ==============================================================================
# 3. FRONTEND INGRESS - Recibe tráfico externo a través de Traefik.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000

---
# ==============================================================================
# 4. FRONTEND EGRESS - Permite al frontend responder a Traefik, resolver DNS 
#    y conectarse al backend.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-app
      ports:
        - protocol: TCP
          port: 8080

---
# ==============================================================================
# 5. BACKEND INGRESS - Recibe solo de Traefik y de Prometheus en finflow-infra.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: finflow-infra
      ports:
        - protocol: TCP
          port: 8080

---
# ==============================================================================
# 6. BACKEND EGRESS - Solo puede hablar con su propia DB, Redis, y Unleash.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-app
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-postgres-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-redis
      ports:
        - protocol: TCP
          port: 6339
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: finflow-infra
      ports:
        - protocol: TCP
          port: 4242

---
# ==============================================================================
# 7. DATABASE - Solo el backend le puede hablar. Nadie más, ni el frontend.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-ingress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-postgres-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-app
      ports:
        - protocol: TCP
          port: 5432

---
# ==============================================================================
# 8. REDIS - Igual que la DB, solo el backend.
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-app
      ports:
        - protocol: TCP
          port: 6339
{{- end }}
