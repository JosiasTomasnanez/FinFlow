{{- if or (contains "prod" .Release.Name) (eq .Values.environment "prod") }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: {{ .Release.Name }}-app-secret
  namespace: finflow-prod
spec:
  encryptedData:
    DB_NAME: 
    DB_PASSWORD: 
    DB_USER: 
    UNLEASH_TOKEN: 
  template:
    metadata:
      creationTimestamp: null
      name: {{ .Release.Name }}-app-secret
      namespace: finflow-prod
{{- end }}
