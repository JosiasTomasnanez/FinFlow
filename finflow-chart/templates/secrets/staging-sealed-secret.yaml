{{- if or (contains "staging" .Release.Name) (eq .Values.environment "staging") }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: {{ .Release.Name }}-app-secret
  namespace: finflow-staging
spec:
  encryptedData:
    DB_NAME: 
    DB_PASSWORD: 
    DB_USER: 
    UNLEASH_TOKEN: 
  template:
    metadata:
      creationTimestamp: null
      name: {{ .Release.Name }}-app-secret
      namespace: finflow-staging
{{- end }}
