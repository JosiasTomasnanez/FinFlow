{{- if and .Values.ingress .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finflow-infra-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" }}
  rules:
    - host: {{ index .Values "ingress" "hosts" "unleash" | default "unleash.finflow.local" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unleash-web
                port:
                  number: 4242
    - host: {{ index .Values "ingress" "hosts" "grafana" | default "grafana.finflow.local" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-grafana-service
                port:
                  number: 3000
{{- end }}
