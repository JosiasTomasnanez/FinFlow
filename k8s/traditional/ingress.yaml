apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finflow-ingress
  namespace: finflow
  annotations:
    # Vinculamos el middleware que limpia el prefijo /unleash
    traefik.ingress.kubernetes.io/router.middlewares: finflow-unleash-stripprefix@kubernetescrd
spec:
  ingressClassName: traefik 
  rules:
    - http:
        paths:
          # 🪓 LA ATADA CON ALAMBRE: Todo lo que pida /static va directo a Unleash
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: unleash-web
                port:
                  number: 4242

          # Ruta principal para entrar
          - path: /unleash
            pathType: Prefix
            backend:
              service:
                name: unleash-web
                port:
                  number: 4242

          # APIs de Unleash
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: unleash-web
                port:
                  number: 4242
          - path: /api/client
            pathType: Prefix
            backend:
              service:
                name: unleash-web
                port:
                  number: 4242

          # 📊 Grafana
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000

          # 🚀 Backend de Go
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finflow-app-service 
                port:
                  number: 8080

          # 💻 Frontend de React
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finflow-frontend
                port:
                  number: 3000
---
# Este objeto se encarga de comerse la palabra "/unleash" antes de mandarla al pod
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: unleash-stripprefix
  namespace: finflow
spec:
  stripPrefix:
    prefixes:
      - "/unleash"
