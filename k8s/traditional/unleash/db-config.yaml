apiVersion: v1
kind: ConfigMap
metadata:
  name: unleash-db-config
  namespace: finflow
data:
  POSTGRES_DB: "unleash_system"
  POSTGRES_USER: "admin_devops"
---
apiVersion: v1
kind: Secret
metadata:
  name: unleash-db-secret
  namespace: finflow
type: Opaque
data:
  # password_super_seguro_123 en base64
  POSTGRES_PASSWORD: cGFzc3dvcmRfc3VwZXJfc2VndXJvXzEyMw==
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unleash-db-pvc
  namespace: finflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: unleash-db
  namespace: finflow
spec:
  selector:
    app: unleash-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash-db
  namespace: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unleash-db
  template:
    metadata:
      labels:
        app: unleash-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: unleash-db-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: unleash-db-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unleash-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: unleash-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash-web
  namespace: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unleash-web
  template:
    metadata:
      labels:
        app: unleash-web
    spec:
      containers:
        - name: unleash-web
          image: unleashorg/unleash-server:latest
          ports:
            - containerPort: 4242
          env:
            - name: DATABASE_HOST
              value: "unleash-db"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: unleash-db-config
                  key: POSTGRES_DB
            - name: DATABASE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: unleash-db-config
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unleash-db-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_SSL
              value: "false"
            
            # 🌟 CONFIGURACIÓN DE RUTAS REPARADA (Sin UNLEASH_URL fija)
            - name: URL_PREFIX
              value: "/unleash"
            - name: EXP_FLAGS
              value: "embedProxyFrontend=true"
            - name: BYPASS_WWW_AUTH_FOR_TESTING
              value: "true"
            - name: INIT_ADMIN_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: finflow-backend-secret
                  key: UNLEASH_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: unleash-web
  namespace: finflow
spec:
  selector:
    app: unleash-web
  ports:
    - port: 4242
      targetPort: 4242
  type: ClusterIP
