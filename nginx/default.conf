server {
    listen 80;
    server_name localhost;

    # AUTENTICACIÓN DE UNLEASH
    location /auth/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API ADMIN DE UNLEASH
    location /api/admin/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API FRONTEND DE UNLEASH 
    location /api/frontend/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API FINFLOW
    location /api/ {
        proxy_pass http://finflow-app:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # STATIC DE UNLEASH
    location /static/ {
        proxy_pass http://unleash-web:4242/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Unleash 
    location /unleash/ {
        proxy_pass http://unleash-web:4242;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MÉTRICAS DE PROMETHEUS SERVER
    location /metrics/ {
        proxy_pass http://prometheus:9090/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FRONTEND
    location / {
        proxy_pass http://finflow-frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MONITOREO CON GRAFANA
    location /grafana/ {
        proxy_pass http://grafana:3000; # Sin barra al final, Grafana maneja su subpath nativo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
