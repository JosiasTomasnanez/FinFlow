server {
    listen 80;
    server_name localhost;

    # 1. AUTENTICACIÓN DE UNLEASH (La pieza que faltaba)
    # Bloque crítico para que el login clásico local funcione y no dé 404
    location /auth/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. API ADMIN DE UNLEASH
    location /api/admin/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. API FRONTEND DE UNLEASH 
    location /api/frontend/ {
        proxy_pass http://unleash-web:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. API FINFLOW (Tu Backend en Go)
    location /api/ {
        proxy_pass http://finflow-app:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 5. STATIC DE UNLEASH
    location /static/ {
        proxy_pass http://unleash-web:4242/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    location /unleash/ {
        proxy_pass http://unleash-web:4242;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 7. FRONTEND DE REACT / VITE (Raíz)
    location / {
        proxy_pass http://finflow-frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MONITOREO CON GRAFANA
    location /grafana/ {
        proxy_pass http://grafana:3000; # Sin barra al final, Grafana maneja su subpath nativo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
