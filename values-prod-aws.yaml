argo-rollouts:
  installCRDs: false

environment: "prod"  

backend:
  replicas: 3
  port: 8080
  image:
    repository: josiastomasnanez/finflow-app
    tag: v2
  databaseHost: "finflow-prod-postgres-service"
  databasePort: "5432"
  redisUrl: "redis://finflow-prod-redis-service:6339/0"
  unleashUrl: "http://unleash-web.finflow-infra.svc.cluster.local:4242/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}

database:
  storageSize: 5Gi 

frontend:
  replicas: 3
  image:
    repository: josiastomasnanez/finflow-frontend
    tag: v3
  apiUrl: "http://k8s-finflowprodgroup-be3700653a-396980022.us-east-1.elb.amazonaws.com/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}

ingress:
  enabled: true
  className: "alb"
  host: "k8s-finflowprodgroup-be3700653a-396980022.us-east-1.elb.amazonaws.com"
  annotations:
    alb.ingress.kubernetes.io/group.name: finflow-prod-group
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
