argo-rollouts:
  installCRDs: false

environment: "prod"  

backend:
  replicas: 3
  port: 8080
  image:
    repository: 199667819856.dkr.ecr.us-east-1.amazonaws.com/finflow-backend
    tag: latest
  databaseHost: "finflow-prod-postgres-service"
  databasePort: "5432"
  redisUrl: "redis://finflow-prod-redis-service:6339/0"
  unleashUrl: "http://unleash-web.finflow-infra.svc.cluster.local:4242/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}
  autoscaling:
    minReplicas: 3
    maxReplicas: 10
    cooldownPeriod: 180
    threshold: 25

# --- SECCIÓN ADAPTADA PARA LA NUEVA LÓGICA DE BASE DE DATOS EN AWS ---
database:
  enabled: true
  storageSize: 5Gi  
  storageClass: "ebs-sc"        
  nodeSelector:                 
    tipo: "BD"
  tolerations:                 
    - key: "tipo"
      operator: "Equal"
      value: "BD"
      effect: "NoSchedule"

frontend:
  replicas: 3
  image:
    repository: 199667819856.dkr.ecr.us-east-1.amazonaws.com/finflow-frontend
    tag: latest
  apiUrl: "/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}

ingress:
  enabled: true
  className: "alb"
  host: ""
  annotations:
    alb.ingress.kubernetes.io/group.name: finflow-prod-group
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
