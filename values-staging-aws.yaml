environment: "staging" 

backend:
  replicas: 1
  port: 8080
  image:
    repository: 199667819856.dkr.ecr.us-east-1.amazonaws.com/finflow-backend
    tag: latest
  databaseHost: "finflow-staging-postgres-service"
  databasePort: "5432"
  redisUrl: "redis://finflow-staging-redis-service:6339/0"
  unleashUrl: "http://unleash-web.finflow-infra.svc.cluster.local:4242/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
    cooldownPeriod: 300
    threshold: 10

database:
  enabled: true
  storageSize: 1Gi  
  storageClass: "ebs-sc"        
  nodeSelector:                 
    tipo: "BD"
  tolerations:                  
    - key: "tipo"
      operator: "Equal"
      value: "BD"
      effect: "NoSchedule"

frontend:
  replicas: 1
  image:
    repository: 199667819856.dkr.ecr.us-east-1.amazonaws.com/finflow-frontend
    tag: latest
  apiUrl: "/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {} 

ingress:
  enabled: true
  className: "alb"
  host: ""
  annotations:
    alb.ingress.kubernetes.io/group.name: finflow-staging-group
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
