    repository: josiastomasnanez/finflow-frontend
    tag: ed01785e28c3c7426ea77dd37e873475fc6df80a
  apiUrl: "http://staging.finflow.local/api"
  argoStrategy:
    steps:
      - setWeight: 33
      - pause: {}
ingress:
  enabled: true
  className: "traefik"
  host: "staging.finflow.local"
